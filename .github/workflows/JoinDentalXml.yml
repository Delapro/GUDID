name: 2) Join Dental-Xml files

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  #push:
  #  branches: [ "main" ]
  #pull_request:
  #  branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      source_workflow:
        description: "Workflow-Datei, aus der die Artefakte kommen: DownloadGUDIDAndExpand.yml"
        required: true
        default: "DownloadGUDIDAndExpand.yml"
      artifact_pattern:
        description: "Glob/Pattern für Artefakt-Namen"
        required: true
        default: "Dental-xml*"  

permissions:
  actions: read
  contents: read
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
        
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Upgrade to latest powershell on Linux
        run: |
          # docs: https://learn.microsoft.com/de-de/powershell/scripting/install/install-other-linux?view=powershell-7.3#installation-using-a-binary-archive-file
          # Download the powershell '.tar.gz' archive
          # curl -L -o /tmp/powershell.tar.gz https://github.com/PowerShell/PowerShell/releases/download//v7.5.1/powershell-7.5.1-linux-x64.tar.gz
          curl -L -o /tmp/powershell.tar.gz https://github.com/PowerShell/PowerShell/releases/download/v7.6.0-rc.1/powershell-7.6.0-rc.1-linux-x64.tar.gz
          # Create the target folder where powershell will be placed
          sudo mkdir -p /opt/microsoft/powershell/7
          # Expand powershell to the target folder
          sudo tar zxf /tmp/powershell.tar.gz -C /opt/microsoft/powershell/7
          # Set execute permissions
          sudo chmod +x /opt/microsoft/powershell/7/pwsh
          # not necessary:
          # Create the symbolic link that points to pwsh
          # sudo ln -s /opt/microsoft/powershell/7/pwsh /usr/bin/pwsh

      - name: Find latest successful run of source workflow on this branch
        id: findrun
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $workflow = "${{ inputs.source_workflow }}"
          $branch   = "${{ github.ref_name }}"
          # Letzten erfolgreichen Run dieses Workflows auf diesem Branch finden
          $runs = gh run list `
            --workflow $workflow `
            --branch $branch `
            --status success `
            --limit 1 `
            --json databaseId,headSha,conclusion | ConvertFrom-Json
          if (-not $runs -or -not $runs[0].databaseId) {
            throw "Kein erfolgreicher Run gefunden für workflow='$workflow' auf branch='$branch'."
          }
          "run_id=$($runs[0].databaseId)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha=$($runs[0].headSha)"      | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download matching artifacts (keine Namenskollisionen, je Artefakt eigener Ordner)
        uses: actions/download-artifact@v5
        with:
          run-id: ${{ steps.findrun.outputs.run_id }}
          pattern: ${{ inputs.artifact_pattern }}
          path: Dental-xml-Artefakt
          merge-multiple: true  # alle Artefakte in ein Verzeichnis
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show what we got
        run: |
          echo "Source run: ${{ steps.findrun.outputs.run_id }} (SHA: ${{ steps.findrun.outputs.sha }})"
          find . -maxdepth 2 -type f | sed -n '1,200p'
          
      # Runs a set of commands using the runners shell
      - name: Joining xml files
        shell: pwsh
        run: |
          # Die nötigen Dateien müssen zuerst ins Dental-xml Verzeichnis im Repository hochgeladen worden sein!!
          ./JoinDentalXML.PS1

      - uses: actions/upload-artifact@v4
        with:
          name: Gudid-Dental
          path: ${{ github.workspace }}/Dental-xml-Artefakt/Gudid-Dental.xml
          
